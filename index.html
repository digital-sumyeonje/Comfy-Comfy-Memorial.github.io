<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>편안편안 메모리얼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700;900&family=Shippori+Mincho:wght@500;700;800&display=swap" rel="stylesheet">
<!-- Galmuri — 한글 지원 픽셀 비트맵 폰트 -->
<link href="https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/galmuri.css" rel="stylesheet">
<!-- html2canvas — 진행도 저장 시 DOM → PNG 변환 -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  :root {
    --bg:        #f1eeeb;   /* warm off-white */
    --surface:   #ffffff;
    --soft:      #e6e2de;
    --line:      #c9c5c1;
    --gray:      #8a8784;
    --mid:       #5a5754;
    --ink:       #1a1a1a;
    --pink:      #ff5b8e;
    --dialog-top: #6f6c69;
    --dialog-bot: #4a4744;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: 'Galmuri11', 'DotGothic16', 'Noto Sans KR', monospace;
    background: var(--bg);
    color: var(--ink);
    overflow: hidden;
    height: 100vh;
    /* 픽셀 폰트는 안티앨리어싱 끄고 렌더 */
    -webkit-font-smoothing: none;
    font-smooth: never;
    image-rendering: pixelated;
  }

  /* YouTube 콘텐츠는 픽셀화하지 않음 — 썸네일/영상은 원본 그대로 */
  .video-inner img,
  .video-inner iframe,
  .preview-thumb img,
  .silhouette-wrap img {
    image-rendering: auto !important;
  }

  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    background: none;
    color: inherit;
  }

  /* ============================
     PAGE TRANSITIONS
     each top-level <section> is a fixed full-screen page.
     Only `.active` page is visible. Wheel scrolling switches.
     ============================ */
  .page {
    position: fixed;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transform: translateY(28px);
    transition: opacity 0.65s cubic-bezier(.2,.8,.2,1),
                transform 0.65s cubic-bezier(.2,.8,.2,1);
    overflow-y: auto;
    overflow-x: hidden;
  }

  .page.active {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }

  /* ============================
     TITLE SCREEN
     ============================ */
  #title {
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background-color: var(--bg);
    /* 픽셀화된 mood-graphic을 풀스크린 배경으로 */
    background-image: url('mood-graphic-pixel.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    image-rendering: pixelated;
  }
  /* 텍스트 가독성을 위한 옅은 오버레이 */
  #title::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 255, 0.45);
    pointer-events: none;
  }

  .title-text {
    font-family: 'Galmuri11', 'DotGothic16', monospace;
    font-weight: 700;
    font-size: clamp(3rem, 10vw, 8rem);
    letter-spacing: 0;
    line-height: 1.15;
    color: var(--ink);
    text-align: center;
    user-select: none;
    /* 픽셀 그림자 — 픽셀 게임 타이틀 느낌 */
    text-shadow: 4px 4px 0 var(--soft), 8px 8px 0 var(--line);
  }

  .scroll-hint {
    position: absolute;
    bottom: 8vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.85rem;
    color: var(--mid);
    letter-spacing: 0.3em;
    animation: bounceDown 1.8s ease-in-out infinite;
  }

  @keyframes bounceDown {
    0%, 100% { transform: translate(-50%, 0); opacity: 0.6; }
    50%      { transform: translate(-50%, 8px); opacity: 1; }
  }

  /* ============================
     HEROINE SELECT
     ============================ */
  #heroine-select {
    background-color: var(--bg);
    /* 타이틀과 동일하게 픽셀화된 mood-graphic을 풀스크린 배경으로 */
    background-image: url('mood-graphic-pixel.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    image-rendering: pixelated;
    /* 헤더(절대 배치)가 top: 3.5vh 에 있으므로 그 밑으로 콘텐츠가 오도록 padding-top 확보 */
    padding: 11vh 5vw 6vh;
    position: relative;
  }
  /* 텍스트/카드 가독성을 위한 옅은 흰색 오버레이 (#title 과 같은 처리) */
  #heroine-select::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 255, 0.45);
    pointer-events: none;
    z-index: 0;
  }
  #heroine-select > * { position: relative; z-index: 1; }

  /* HOME 버튼 — 좌상단 고정. 휠 스크롤이 더 이상 타이틀로 안 보내므로
     이 버튼이 유일한 복귀 경로. 픽셀 박스 그림자 스타일. */
  .home-btn {
    position: absolute;
    top: 3.5vh;
    left: 3vw;
    z-index: 6;
    font-family: 'Galmuri11', 'DotGothic16', monospace;
    font-size: 1.1rem;
    color: var(--ink);
    background: var(--surface);
    border: 2px solid var(--ink);
    padding: 0.7rem 1.2rem;
    letter-spacing: 0.05em;
    box-shadow: 4px 4px 0 var(--ink);
    transition: transform 0.1s steps(2), box-shadow 0.1s steps(2);
    cursor: pointer;
  }
  .home-btn:hover {
    background: var(--soft);
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--ink);
  }
  .home-btn:active {
    transform: translate(4px, 4px);
    box-shadow: 0 0 0 var(--ink);
  }
  /* 자식 요소 (텍스트/아이콘)가 클릭을 가로채지 못하게 — 버튼 전체 영역 클릭 가능 */
  .home-btn * { pointer-events: none; }

  /* 진행도 저장 버튼 — 우상단 (HOME 버튼과 같은 픽셀 박스 스타일, 같은 높이) */
  .save-btn {
    position: absolute;
    top: 3.5vh;
    right: 3vw;
    z-index: 6;
    background: var(--surface);
    border: 2px solid var(--ink);
    color: var(--ink);
    padding: 0.7rem 1rem;   /* HOME 버튼이랑 비슷한 높이 + 정사각에 가까운 비율 */
    box-shadow: 4px 4px 0 var(--ink);
    transition: transform 0.1s steps(2), box-shadow 0.1s steps(2);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .save-btn:hover {
    background: var(--soft);
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--ink);
  }
  .save-btn:active {
    transform: translate(4px, 4px);
    box-shadow: 0 0 0 var(--ink);
  }
  .save-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .save-btn svg { display: block; width: 22px; height: 22px; }
  /* 아이콘이 클릭 가로채지 않게 */
  .save-btn * { pointer-events: none; }

  /* 헤딩을 좌/우 버튼과 같은 vertical 라인에 절대 배치 — 셋이 한 줄에 정렬됨 */
  .select-header {
    position: absolute;
    top: 3.5vh;
    left: 0;
    right: 0;
    height: 3rem;            /* 버튼 padding+border 고려한 대략적인 높이 */
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    z-index: 4;              /* 좌/우 버튼(z:6) 보다 낮게 — 클릭 가로채지 않음 */
    pointer-events: none;
  }

  .select-header h2 {
    font-family: 'Galmuri11', 'DotGothic16', monospace;
    font-size: clamp(1.4rem, 2.6vw, 2rem);
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0;
    margin: 0;
    line-height: 1;
  }

  .select-header .small {
    font-size: 0.78rem;
    color: var(--gray);
    margin-top: 0.6rem;
    letter-spacing: 0.35em;
  }

  /* ----- 스크롤 프레임 (픽셀 박스, 라운딩) ----- */
  .heroine-frame {
    position: relative;
    max-width: 1200px;
    margin: 0 auto;
    background: var(--surface);
    border: 2px solid var(--ink);
    border-radius: 22px;
    box-shadow: 6px 6px 0 var(--ink);
    border-radius: 18px;
    height: 75vh;
    overflow: hidden;
  }

  .heroine-frame .frame-corner {
    position: absolute;
    width: 28px;
    height: 28px;
    border: 0 solid var(--ink);
    pointer-events: none;
    z-index: 5;
  }
  .heroine-frame .frame-corner.tl { top: 12px; left: 12px;
    border-top-width: 5px; border-left-width: 5px; }
  .heroine-frame .frame-corner.tr { top: 12px; right: 12px;
    border-top-width: 5px; border-right-width: 5px; }
  .heroine-frame .frame-corner.bl { bottom: 12px; left: 12px;
    border-bottom-width: 5px; border-left-width: 5px; }
  .heroine-frame .frame-corner.br { bottom: 12px; right: 12px;
    border-bottom-width: 5px; border-right-width: 5px; }

  .heroine-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 2.5rem 1.5rem;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 2.5rem 2.5rem 2.5rem;
  }

  /* 픽셀 스크롤바 */
  .heroine-grid::-webkit-scrollbar { width: 16px; }
  .heroine-grid::-webkit-scrollbar-track {
    background: var(--surface);
    border-left: 2px solid var(--ink);
  }
  .heroine-grid::-webkit-scrollbar-thumb {
    background: var(--ink);
    border: 2px solid var(--ink);
    box-shadow: inset 0 0 0 2px var(--surface);
  }

  .heroine-card {
    position: relative;
    cursor: pointer;
    text-align: center;
    transition: transform 0.1s steps(2);
    padding: 18px;
  }

  .heroine-card:hover { transform: translateY(-4px); }

  /* 호버 시 4 코너 브래킷 표시 */
  .heroine-card .hover-corner {
    position: absolute;
    width: 22px;
    height: 22px;
    border: 0 solid var(--ink);
    pointer-events: none;
    opacity: 0;
    z-index: 4;
    transition: opacity 0.1s steps(2);
  }
  .heroine-card:hover .hover-corner { opacity: 1; }
  .heroine-card .hover-corner.tl { top: 0; left: 0;
    border-top-width: 4px; border-left-width: 4px; }
  .heroine-card .hover-corner.tr { top: 0; right: 0;
    border-top-width: 4px; border-right-width: 4px; }
  .heroine-card .hover-corner.bl { bottom: 0; left: 0;
    border-bottom-width: 4px; border-left-width: 4px; }
  .heroine-card .hover-corner.br { bottom: 0; right: 0;
    border-bottom-width: 4px; border-right-width: 4px; }

  /* 마스크 본체 + 윤곽 오버레이 컨테이너 */
  .silhouette-frame {
    position: relative;
    width: 100%;
    aspect-ratio: 1473 / 1300;
  }

  .silhouette-outline {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    image-rendering: pixelated;
  }

  /* 흉상 PNG의 알파를 마스크로 사용 — 안에 YouTube 썸네일이 보임.
     모든 silhouette-N.png는 1473×1300 (가장 넓은 히로인 기준) 박스에
     원본 크기 그대로 가운데 정렬해 패딩되어 있음.
     `--silhouette` 변수는 카드별로 JS에서 다르게 주입함. */
  .silhouette-wrap {
    width: 100%;
    aspect-ratio: 1473 / 1300;
    position: relative;
    overflow: hidden;
    background: var(--soft);
    -webkit-mask-image: var(--silhouette);
            mask-image: var(--silhouette);
    -webkit-mask-size: contain;
            mask-size: contain;
    -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
    -webkit-mask-position: center;
            mask-position: center;
  }

  .silhouette-wrap img {
    width: 100%;
    height: 100%;
    scale: 1.3;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  .heroine-label {
    width: 100%;
    margin-top: 1.1rem;
    font-size: 1rem;
    color: var(--ink);
    font-weight: 500;
    letter-spacing: 0.02em;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 3.2rem;
    text-align: center;
    word-wrap: break-word;
    white-space: normal;
  }

  /* 제목이 길면 두 줄까지만 노출하고 말줄임. 이후 라인은 잘려나감. */
  .heroine-label .heroine-name {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.35;
    max-height: 2.7em;
    word-break: keep-all;
  }

  .heroine-label .loc {
    display: block;
    font-size: 0.78rem;
    color: var(--gray);
    margin-top: 0.3rem;
    letter-spacing: 0.1em;
  }

  /* mini affection display below the card */
  .aff-mini {
    margin-top: 0.7rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    font-size: 0.72rem;
    color: var(--mid);
    letter-spacing: 0.05em;
  }

  .aff-mini-icon {
    color: var(--pink);
    font-size: 0.85rem;
    line-height: 1;
    filter: drop-shadow(2px 0 0 black) 
            drop-shadow(-2px 0 0 black) 
            drop-shadow(0 2px 0 black) 
            drop-shadow(0 -2px 0 black);
  }

  .aff-mini-bar {
    width: 80px;
    height: 8px;
    border: 2px solid var(--ink);
    background: #fff;
    overflow: hidden;
    border-radius: 0;
  }

  .aff-mini-fill {
    display: block;
    height: 100%;
    width: 0%;
    background: var(--pink);
    /* 부드러운 트랜지션 대신 단계적으로 차오르는 픽셀 느낌 */
    transition: width 0.3s steps(8);
  }

  .aff-mini-pct {
    min-width: 32px;
    text-align: left;
    font-variant-numeric: tabular-nums;
    color: var(--mid);
  }

  /* ============================
     MAIN FLOW — pink mood-graphic bg, absolute back-btn
     ============================ */
  #main-flow {
    position: fixed;
    inset: 0;
    z-index: 50;
    overflow: hidden;
    background-color: var(--bg);
    background-image: url('mood-graphic-pixel.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    image-rendering: pixelated;
    transition: opacity 0.4s ease;
  }
  #main-flow::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 255, 0.35);
    pointer-events: none;
    z-index: 0;
  }
  #main-flow > * { position: relative; z-index: 1; }

  #main-flow.hidden {
    display: none;
    opacity: 0;
    pointer-events: none;
  }

  /* ← 뒤로가기 — 좌상단 절대위치 픽셀 박스 */
  .back-btn {
    position: absolute;
    top: 2.5vh;
    left: 2vw;
    z-index: 10;
    font-family: 'Galmuri11', 'DotGothic16', monospace;
    font-size: 1.1rem;
    color: var(--ink);
    background: var(--surface);
    border: 2px solid var(--ink);
    padding: 0.4rem 0.85rem;
    box-shadow: 4px 4px 0 var(--ink);
    transition: transform 0.1s steps(2), box-shadow 0.1s steps(2);
  }
  .back-btn:hover {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--ink);
  }
  .back-btn:active {
    transform: translate(4px, 4px);
    box-shadow: 0 0 0 var(--ink);
  }

  .mf-body {
    display: grid;
    grid-template-columns: minmax(260px, 320px) 1fr;
    gap: 2.5rem;
    padding: 9vh 4vw 4vh;
    height: 100%;
    overflow: hidden;
  }

  /* ----- left panel ----- */
  .mf-left {
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
    min-height: 0;
    overflow-y: auto;
  }

  .preview-thumb {
    width: 100%;
    aspect-ratio: 1 / 1;
    border: 2px solid var(--ink);
    overflow: hidden;
    background: var(--surface);
    box-shadow: 4px 4px 0 var(--ink);
  }
  .preview-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* 영상 제목 + 성별 아이콘 — 어두운 핀 박스 */
  .meta-pill {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    padding: 0.55rem 0.85rem;
    background: var(--ink);
    color: #fff;
    border-radius: 4px;
    font-size: 0.82rem;
    line-height: 1.35;
    word-break: keep-all;
  }
  .meta-pill .meta-text {
    flex: 1;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .meta-pill .meta-icon {
    flex-shrink: 0;
    font-size: 1rem;
    color: #fff;
  }

  /* 가로 호감도 게이지 — 좌측 하트 + 핑크 채우기 바 */
  .aff-meter-h {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.3rem 0;
  }
  .aff-meter-h .heart-icon {
    font-size: 1.5rem;
    color: var(--pink);
    user-select: none;
    transition: transform 0.2s ease;
    filter: drop-shadow(2px 0 0 black) 
            drop-shadow(-2px 0 0 black) 
            drop-shadow(0 2px 0 black) 
            drop-shadow(0 -2px 0 black);
  }
  .aff-meter-h .heart-icon.pulse { transform: scale(1.3); }
  .aff-bar-h {
    flex: 1;
    height: 20px;
    border: 2px solid var(--ink);
    background: var(--surface);
    overflow: visible;
  }
  .aff-fill-h {
    width: 0%;
    height: 100%;
    background: var(--pink);
    transition: width 0.45s steps(10);
  }

  /* choices — 알약 모양 + 검정 픽셀 그림자 */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    margin-top: 0.2rem;
  }
  .choice {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    background: var(--surface);
    border: 2px solid var(--ink);
    border-radius: 999px;
    padding: 0.55rem 0.55rem 0.55rem 1rem;
    font-size: 0.85rem;
    color: var(--ink);
    text-align: left;
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform 0.1s steps(2), box-shadow 0.1s steps(2), background 0.1s steps(2);
  }
  .choice:hover {
    background: var(--soft);
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--ink);
  }
  .choice:active {
    transform: translate(3px, 3px);
    box-shadow: 0 0 0 var(--ink);
  }
  .choice .ctext {
    flex: 1;
    padding-right: 0.5rem;
    line-height: 1.25;
    word-break: keep-all;
  }
  .choice .cnum {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--ink);
    color: #fff;
    font-size: 0.75rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }

  /* ----- right stage — 흰색 라운드 박스 안에 silhouette + dialog ----- */
  .mf-right {
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: visible;
    min-height: 0;
    max-height: 80vh;
  }

  .stage-panel {
    position: relative;
    flex: 1;
    background: var(--surface);
    border: 2px solid var(--ink);
    border-radius: 22px;
    box-shadow: 6px 6px 0 var(--ink);
    display: flex;
    flex-direction: column;
    padding: 1.5rem;
    gap: 0rem;
    min-height: 0;
    overflow: visible;
    
  }

  .silhouette-stage {
    position: relative;
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .silhouette-wrap-main {

/* CSV parser — handles quoted multi-line cells and escaped quotes ("") */
function parseCSV(text) {
  const rows = [];
  let cur = [];
  let cell = "";
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQuotes && text[i + 1] === '"') { cell += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      cur.push(cell); cell = "";
    } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (ch === '\r' && text[i + 1] === '\n') i++;
      cur.push(cell); cell = "";
      rows.push(cur); cur = [];
    } else {
      cell += ch;
    }
  }
  if (cell.length || cur.length) { cur.push(cell); rows.push(cur); }

  const headers = (rows.shift() || []).map(h => h.trim());
  return rows
    .filter(r => r.some(v => String(v).trim() !== ""))
    .map(r => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (r[i] != null ? String(r[i]) : "").trim(); });
      return obj;
    });
}

/* Extract a YouTube ID from various URL shapes a user might paste in
   UL-Images: thumbnail URL, watch URL, youtu.be short URL, or raw ID. */
function youtubeIdFromImage(url) {
  if (!url) return "";
  const s = String(url).trim();
  let m = s.match(/\/vi\/([A-Za-z0-9_-]{6,})\//);          // img.youtube.com thumbnail
  if (m) return m[1];
  m = s.match(/[?&]v=([A-Za-z0-9_-]{6,})/);                // youtube.com/watch?v=ID
  if (m) return m[1];
  m = s.match(/youtu\.be\/([A-Za-z0-9_-]{6,})/);           // youtu.be/ID
  if (m) return m[1];
  m = s.match(/\/embed\/([A-Za-z0-9_-]{6,})/);             // youtube.com/embed/ID
  if (m) return m[1];
  if (/^[A-Za-z0-9_-]{6,16}$/.test(s)) return s;           // raw ID
  return "";
}

function transformCmsRows(rows) {
  if (!rows || !rows.length) return [];
  const first = rows[0] || {};
  pageMeta = {
    title:       first[KEYS.title]       || pageMeta.title,
    description: first[KEYS.description] || pageMeta.description,
    header:      first[KEYS.title]       || pageMeta.header,
    about:       first[KEYS.about]       || pageMeta.about,
  };

  const out = [];
  for (const r of rows) {
    // gate on UL-Project — every row that has a project becomes a heroine card,
    // even if UL-Images hasn't been filled in yet.
    const project = String(r[KEYS.project] || '').trim();
    if (!project) continue;

    const rawImage = String(r[KEYS.image] || '').trim();
    const yid = youtubeIdFromImage(rawImage);
    const thumbnail = yid
      ? `https://img.youtube.com/vi/${yid}/hqdefault.jpg`
      : rawImage;  // fallback: use whatever URL the user pasted

    // 영상 제목은 UL-Project 값 그대로 사용 (UL-Note는 해시태그/카테고리라 별도)
    const dateRaw = r[KEYS.date] != null ? String(r[KEYS.date]).trim() : '';
    const note    = String(r[KEYS.note] || '').trim();
    out.push({
      name:      project,
      location:  String(r[KEYS.location] || '').trim(),
      title:     project,                    // ← 영상 제목 = UL-Project
      birthday:  dateRaw ? dateRaw + '년' : '',
      home:      project,
      note:      note,                       // 해시태그/카테고리 등
      youtubeId: yid,
      thumbnail: thumbnail,
      subs:      SUBS_BY_ID[yid] || [],
    });
  }
  return out;
}


function applyPageMeta() {
  if (pageMeta.title) document.title = pageMeta.title;
  const titleEl = document.querySelector('.title-text');
  if (titleEl && pageMeta.header) {

    titleEl.innerHTML = idx > 0
      ? pageMeta.header.slice(0, idx) + '<br>' + pageMeta.header.slice(idx + 1)
      : pageMeta.header;
  }
  let descMeta = document.querySelector('meta[name="description"]');
  if (!descMeta) {
    descMeta = document.createElement('meta');
    descMeta.setAttribute('name', 'description');
    document.head.appendChild(descMeta);
  }

}

   ========================================================= */
fetch(CSV_URL + "&t=" + Date.now(), { cache: "no-store" })
  .then((res) => {

    return res.text();

  .then((text) => {
    const rows = parseCSV(text);
    const transformed = transformCmsRows(rows);
    if (!transformed.length) throw new Error("CMS returned 0 valid rows");
    heroines = transformed;
    console.log("SheetCMS loaded — " + heroines.length + " heroines");

/* =========================================================
   PAGE TRANSITIONS — wheel between sections
   ========================================================= */
const PAGES = ['title', 'heroine-select'];
let currentPage = 0;
let transitioning = false;
let lastWheelTime = 0;

function showPage(idx) {
  PAGES.forEach((id, i) => {
    document.getElementById(id).classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.page-indicator .dot').forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });
  currentPage = idx;
}

/* page indicator dots */
const indicator = document.getElementById('pageIndicator');
PAGES.forEach((id, i) => {
  const dot = document.createElement('button');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.title = id;
  dot.addEventListener('click', () => {
    if (transitioning) return;
    transitioning = true;
    showPage(i);
    setTimeout(() => transitioning = false, 700);
  });
  indicator.appendChild(dot);
});

const mainFlowEl = document.getElementById('main-flow');

function tryAdvance(direction) {
  if (transitioning) return;
  if (!mainFlowEl.classList.contains('hidden')) return;

  const cur = document.getElementById(PAGES[currentPage]);
  if (direction > 0) {
    // scrolling down — only advance if page is at bottom (or non-scrollable)
    if (cur.scrollHeight - cur.clientHeight - cur.scrollTop > 4) return;
    if (currentPage < PAGES.length - 1) {
      transitioning = true;
      showPage(currentPage + 1);
      setTimeout(() => transitioning = false, 720);
    }
  }
  // 위로 휠/스와이프로 이전 페이지로 돌아가지 않음 — 홈 버튼으로만 이동.
  // (이전엔 박스 안에서 스크롤하다가 자꾸 타이틀로 튕김)
}

window.addEventListener('wheel', (e) => {
  const now = Date.now();
  if (now - lastWheelTime < 600) return;
  if (Math.abs(e.deltaY) < 18) return;
  lastWheelTime = now;
  tryAdvance(e.deltaY > 0 ? 1 : -1);
}, { passive: true });

/* touch swipe (mobile) */
let touchStartY = null;
window.addEventListener('touchstart', (e) => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });
window.addEventListener('touchend', (e) => {
  if (touchStartY === null) return;
  const dy = touchStartY - (e.changedTouches[0]?.clientY ?? touchStartY);
  if (Math.abs(dy) > 60) tryAdvance(dy > 0 ? 1 : -1);
  touchStartY = null;
}, { passive: true });

(function loadYouTubeAPI() {
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);
})();

window.onYouTubeIframeAPIReady = function () {
  ytApiReady = true;
  while (ytReadyQueue.length) ytReadyQueue.shift()();
};

function createYouTubePlayer(videoId) {
  destroyYouTubePlayer();
  videoInner.innerHTML = '<div id="ytPlayer"></div>';

  const playerVars = {
    autoplay: 1, mute: 1, rel: 0,
    modestbranding: 1, playsinline: 1,
    controls: 1, enablejsapi: 1,
  };
  if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
    playerVars.origin = window.location.origin;
  }

  const create = () => {
    currentYtPlayer = new YT.Player('ytPlayer', {
      videoId, width: '100%', height: '100%',
      playerVars,
      events: {
        onReady: (e) => {
          try {
            e.target.playVideo();
            setTimeout(() => {
              try { e.target.unMute(); e.target.setVolume(70); } catch(_){}
            }, 150);
            // 영상이 시작될 때 광고 감지 시작 (0.5초 뒤 폴링 시작)
            setTimeout(() => {
              if (typeof startAdDetection === 'function') startAdDetection();
            }, 500);
          } catch (err) { console.warn('YT playback error:', err); }
        },
        onError: (e) => { console.warn('YT error code:', e.data); }
      },
    });
  };

  if (ytApiReady) create();
  else ytReadyQueue.push(create);
}

function destroyYouTubePlayer() {
  if (typeof stopAdDetection === 'function') stopAdDetection();
  if (currentYtPlayer) {
    try { currentYtPlayer.destroy(); } catch (e) {}
    currentYtPlayer = null;
  }
  videoInner.innerHTML = '';
}

function closeMainFlow() {

  if (currentHeroineIdx >= 0) {
    heroineState[currentHeroineIdx].affection = affection;
    refreshCard(currentHeroineIdx);

  mainFlow.classList.add('hidden');
  mainFlow.setAttribute('aria-hidden', 'true');
  stopSubtitleLoop();
  isPlaying = false;
  destroyYouTubePlayer();
  // 광고 알림 떠있으면 같이 닫음
  if (typeof hideAdNotice === 'function') hideAdNotice();

  // 모달 위에서 휠/네비게이션이 없어도 메인 플로우가 닫힌 뒤

  const heroineSelectIdx = PAGES.indexOf('heroine-select');
  if (heroineSelectIdx >= 0 && currentPage !== heroineSelectIdx) {
    showPage(heroineSelectIdx);
  }
}

/* 한글 받침 유무에 따라 와/과 결정. 한글 외 문자는 '과'로 fallback. */
function attachWaGwa(s) {
  if (!s) return s;
  const ch = s[s.length - 1];
  const code = ch.charCodeAt(0);
  if (code >= 0xAC00 && code <= 0xD7A3) {
    return s + (((code - 0xAC00) % 28) === 0 ? '와' : '과');
  }
  return s + '과';
}
/* 한글 받침 유무에 따라 을/를 결정. 한글 외 문자는 '을'로 fallback. */
function attachEulReul(s) {
  if (!s) return s;
  const ch = s[s.length - 1];
  const code = ch.charCodeAt(0);
  if (code >= 0xAC00 && code <= 0xD7A3) {
    return s + (((code - 0xAC00) % 28) === 0 ? '를' : '을');
  }
  return s + '을';
}

/* =========================================================
   AD NOTICE — 영상 재생 시작 시 광고 대기 알림
   처음에는 '기다리는 중...' + 비활성 버튼.
   AD_SKIP_DELAY ms 후 '말을 걸어보자!' + 활성 확인 버튼으로 전환.
   ========================================================= */
const AD_SKIP_DELAY = 6000;  // 유튜브 광고 비스킵 구간 ≈ 5초 + 여유
const adNotice         = document.getElementById('adNotice');
const adNoticeHeadline = document.getElementById('adNoticeHeadline');
const adNoticeTitle    = document.getElementById('adNoticeTitle');
const adNoticeSkip     = document.getElementById('adNoticeSkip');
let adSkipTimer = null;

function showAdNotice(title) {
  if (!adNotice || !adNoticeTitle || !adNoticeSkip) return;
  // 1단계: 기다리는 중...
  adNoticeHeadline.textContent = '광고 재생 중';
  adNoticeTitle.textContent = `${attachEulReul(title || '영상')} 만나기 위해\n기다리는 중…`;
  adNoticeTitle.style.whiteSpace = 'pre-line';
  adNoticeSkip.textContent = '잠시만 기다려주세요…';
  adNoticeSkip.disabled = true;
  adNotice.classList.remove('hidden');
  adNotice.setAttribute('aria-hidden', 'false');

  if (adSkipTimer) clearTimeout(adSkipTimer);
  adSkipTimer = setTimeout(() => {
    // 2단계: YouTube 광고 스킵 가능 시점 — 사용자에게 직접 스킵 안내
    // (cross-origin iframe 광고는 우리 코드로 스킵할 수 없어서, 닫은 뒤
    //  YouTube 자체 '광고 건너뛰기' 버튼을 사용자가 클릭해야 함)
    adNoticeHeadline.textContent = '말을 걸어보자!';
    adNoticeTitle.textContent =
      '아래 버튼을 누른 뒤,\n영상 우측 하단의 “광고 건너뛰기” 버튼을 눌러줘.';
    adNoticeSkip.textContent = '닫고 직접 스킵하기 →';
    adNoticeSkip.disabled = false;
  }, AD_SKIP_DELAY);
}

function hideAdNotice() {
  if (!adNotice) return;
  adNotice.classList.add('hidden');
  adNotice.setAttribute('aria-hidden', 'true');
  if (adSkipTimer) { clearTimeout(adSkipTimer); adSkipTimer = null; }
}

if (adNoticeSkip) adNoticeSkip.addEventListener('click', () => {

  hideAdNotice();
});
/* 배경(딤) 클릭으로도 닫기 — 단, 비활성 버튼 상태에선 무시 */
if (adNotice) adNotice.addEventListener('click', (e) => {

});

/* =========================================================
   AD DETECTION — getDuration() 으로 광고 재생 여부 판단

   YouTube IFrame API 는 광고 상태를 직접 알려주지 않지만,
   - 광고 재생 중 → getDuration() = 광고 길이 (보통 5~60초)
   - 본편 재생 중 → getDuration() = 영상 길이 (대부분 60초 초과)
   - 광고 → 본편 전환 시 → getDuration() 값이 크게 변함

   이 휴리스틱으로 광고를 감지해서 알림을 띄우고, 본편 시작되면 자동으로 닫음.
   ========================================================= */
const AD_DURATION_THRESHOLD = 90;   // 90초 미만 = 광고로 추정
const AD_DURATION_JUMP      = 5;    // duration 이 5초 이상 변하면 전환으로 판단
const AD_POLL_INTERVAL      = 500;  // 0.5초 간격
const AD_MAX_POLLS          = 60;   // 30초 후 감지 종료
let adDetectionTimer = null;
let adInitialDuration = 0;

function startAdDetection() {
  stopAdDetection();
  adInitialDuration = 0;

  // 영상 재생 시작 → 광고 알림 무조건 표시.
  showAdNotice(currentHeroine?.title || '');

  let polls = 0;
  adDetectionTimer = setInterval(() => {
    polls++;
    if (!currentYtPlayer) { stopAdDetection(); return; }

    let dur = 0;
    try {
      if (typeof currentYtPlayer.getDuration === 'function') {
        dur = currentYtPlayer.getDuration() || 0;
      }
    } catch (e) { /* postMessage 차단된 환경 — 그냥 무시 */ }

    if (dur > 0 && adInitialDuration === 0) {
      adInitialDuration = dur;
    } else if (dur > 0 && adInitialDuration > 0
               && Math.abs(dur - adInitialDuration) > AD_DURATION_JUMP) {
      // duration 이 크게 변함 → 전환 발생.
      const isStillShort = dur < AD_DURATION_THRESHOLD;
      adInitialDuration = dur;

      if (isStillShort) {
        // 또 짧음 → 두 번째 광고가 이어진 거 → 알림 새로 시작 (6초 카운트 리셋)
        showAdNotice(currentHeroine?.title || '');
      } else {
        // 본편 길이 (≥90초) → 광고 종료 → 알림 닫고 감지 종료
        hideAdNotice();
        stopAdDetection();
        return;
      }
    }

    // 폴링만 종료 (알림은 유지 — 사용자가 직접 닫아야 함)
    if (polls > AD_MAX_POLLS) stopAdDetection();
  }, AD_POLL_INTERVAL);
}

function stopAdDetection() {
  if (adDetectionTimer) { clearInterval(adDetectionTimer); adDetectionTimer = null; }
  adInitialDuration = 0;
}

/* =========================================================
   진행도 저장 — html2canvas 로 #heroine-select 영역을 PNG 캡처
   ========================================================= */
const saveBtn = document.getElementById('saveBtn');
if (saveBtn) {
  saveBtn.addEventListener('click', async () => {
    if (typeof html2canvas !== 'function') {
      alert('저장 라이브러리가 아직 로드되지 않았어. 잠시 후 다시 시도해줘.');
      return;
    }
    const target = document.getElementById('heroine-select');
    if (!target) return;

    // 캡처 도중 자기 자신/인디케이터/HOME 버튼은 숨겨둠 (이미지엔 빠짐)
    const indicator = document.querySelector('.page-indicator');
    const elementsToHide = [saveBtn, indicator, homeBtn].filter(Boolean);
    const prevVisibility = elementsToHide.map(el => el.style.visibility);
    elementsToHide.forEach(el => { el.style.visibility = 'hidden'; });

    saveBtn.disabled = true;

    try {
      const canvas = await html2canvas(target, {
        useCORS: true,
        allowTaint: true,
        backgroundColor: null,
        scale: window.devicePixelRatio > 1 ? 2 : 1.5,
        logging: false,
      });

      const dataUrl = canvas.toDataURL('image/png');
      const ts = new Date();
      const stamp =
        `${ts.getFullYear()}${String(ts.getMonth()+1).padStart(2,'0')}${String(ts.getDate()).padStart(2,'0')}`
        + `-${String(ts.getHours()).padStart(2,'0')}${String(ts.getMinutes()).padStart(2,'0')}`;
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = `편안편안-메모리얼-${stamp}.png`;
      document.body.appendChild(a);
      a.click();
      a.remove();
    } catch (err) {
      console.error('[saveBtn] 진행도 저장 실패:', err);
      alert('저장에 실패했어. 콘솔에서 에러를 확인해줘.\n(YouTube 썸네일이 cross-origin 차단되면 캔버스가 tainted 되어 다운로드가 막힐 수 있어.)');
    } finally {
      // 원래 상태 복귀
      elementsToHide.forEach((el, i) => { el.style.visibility = prevVisibility[i] || ''; });
      saveBtn.disabled = false;
    }
  });
}

// 1. 자막 데이터를 저장할 전역 변수
let videoSubtitles = [];

// SRT 파일 로드 및 파싱 (시작/종료 시간 정밀 추출)
async function fetchAndParseSRT(filename) {
    try {
        const response = await fetch(filename);
        const text = await response.text();

        videoSubtitles = text.trim().split(/\n\s*\n/).map(block => {
            const lines = block.split('\n');
            if (lines.length < 3) return null;

            // 시간 포맷 (00:00:00,000 --> 00:00:00,000) 파싱
            const times = lines[1].match(/(\d{2}:\d{2}:\d{2},\d{3})/g);
            if (!times) return null;

            const toSeconds = (t) => {
                const [hms, ms] = t.split(',');
                const [h, m, s] = hms.split(':').map(Number);
                return h * 3600 + m * 60 + s + (ms / 1000);
            };

            return {
                start: toSeconds(times[0]),
                end: toSeconds(times[1]),
                content: lines.slice(2).join('<br>')
            };
        }).filter(Boolean);
        console.log(`✅ ${filename} 자막 로드 완료`);
    } catch (error) {
        console.error("❌ 자막 로드 실패:", error);
    }
}

// 0.1초마다 영상 시간과 자막 대조
function startSubtitleSync(player) {
    if (window.subtitleTimer) clearInterval(window.subtitleTimer);

    window.subtitleTimer = setInterval(() => {
        if (!player || typeof player.getCurrentTime !== 'function') return;

        const now = player.getCurrentTime();
        // 현재 시간에 딱 맞는 자막 찾기
        const currentSub = videoSubtitles.find(s => now >= s.start && now <= s.end);

        if (currentSub) {
            if (subtitleText.innerHTML !== currentSub.content) {
                subtitleText.innerHTML = currentSub.content;
            }
        } else {
            subtitleText.innerHTML = ""; // 자막 없는 구간은 비우기
        }
    }, 100); 
}
