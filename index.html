<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>편안편안 메모리얼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700;900&family=Shippori+Mincho:wght@500;700;800&display=swap" rel="stylesheet">
<!-- Galmuri — 한글 지원 픽셀 비트맵 폰트 -->
<link href="https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/galmuri.css" rel="stylesheet">
<style>
  :root {
    --bg:        #f1eeeb;   /* warm off-white */
    --surface:   #ffffff;
    --soft:      #e6e2de;
    --line:      #c9c5c1;
    --gray:      #8a8784;
    --mid:       #5a5754;
    --ink:       #1a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: 'Galmuri11', 'DotGothic16', 'Noto Sans KR', monospace;
    background: var(--bg);
    color: var(--ink);
    overflow: hidden;
    height: 100vh;
    /* 픽셀 폰트는 안티앨리어싱 끄고 렌더 */
    -webkit-font-smoothing: none;
    font-smooth: never;
    image-rendering: pixelated;
  }

  /* YouTube 콘텐츠는 픽셀화하지 않음 — 썸네일/영상은 원본 그대로 */
  .video-inner img,
  .video-inner iframe,
  .preview-thumb img,
  .silhouette-wrap img {
    image-rendering: auto !important;
  }

  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    background: none;
    color: inherit;
  }

  /* ============================
     PAGE TRANSITIONS
     each top-level <section> is a fixed full-screen page.
     Only `.active` page is visible. Wheel scrolling switches.
     ============================ */
  .page {
    position: fixed;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transform: translateY(28px);
    transition: opacity 0.65s cubic-bezier(.2,.8,.2,1),
                transform 0.65s cubic-bezier(.2,.8,.2,1);
    overflow-y: auto;
    overflow-x: hidden;
  }

  .page.active {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }

  /* ============================
     TITLE SCREEN
     ============================ */
  #title {
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background-color: var(--bg);
    /* 픽셀화된 mood-graphic을 풀스크린 배경으로 */
    background-image: url('mood-graphic-pixel.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    image-rendering: pixelated;
  }
  /* 텍스트 가독성을 위한 옅은 오버레이 */
  #title::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 255, 0.45);
    pointer-events: none;
  }

  .title-text {
    font-family: 'Galmuri11', 'DotGothic16', monospace;
    font-weight: 700;
    font-size: clamp(3rem, 10vw, 8rem);
    letter-spacing: 0;
    line-height: 1.15;
    color: var(--ink);
    text-align: center;
    user-select: none;
    /* 픽셀 그림자 — 픽셀 게임 타이틀 느낌 */
    text-shadow: 4px 4px 0 var(--soft), 8px 8px 0 var(--line);
  }

  .scroll-hint {
    position: absolute;
    bottom: 8vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.85rem;
    color: var(--mid);
    letter-spacing: 0.3em;
    animation: bounceDown 1.8s ease-in-out infinite;
  }

  @keyframes bounceDown {
    0%, 100% { transform: translate(-50%, 0); opacity: 0.6; }
    50%      { transform: translate(-50%, 8px); opacity: 1; }
  }

  /* ============================
     HEROINE SELECT
     ============================ */
  #heroine-select {
    background-color: var(--bg);
    /* 타이틀과 동일하게 픽셀화된 mood-graphic을 풀스크린 배경으로 */
    background-image: url('mood-graphic-pixel.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    image-rendering: pixelated;
    padding: 6vh 5vw;
    position: relative;
  }
  /* 텍스트/카드 가독성을 위한 옅은 흰색 오버레이 (#title 과 같은 처리) */
  #heroine-select::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 255, 0.45);
    pointer-events: none;
    z-index: 0;
  }
  #heroine-select > * { position: relative; z-index: 1; }

  /* HOME 버튼 — 좌상단 고정. 휠 스크롤이 더 이상 타이틀로 안 보내므로
     이 버튼이 유일한 복귀 경로. 픽셀 박스 그림자 스타일. */
  .home-btn {
    position: absolute;
    top: 2vh;
    left: 2vw;
    z-index: 6;
    font-family: 'Galmuri11', 'DotGothic16', monospace;
    font-size: 0.95rem;
    color: var(--ink);
    background: var(--surface);
    border: 2px solid var(--ink);
    padding: 0.45rem 0.9rem;
    letter-spacing: 0.05em;
    box-shadow: 4px 4px 0 var(--ink);
    transition: transform 0.1s steps(2), box-shadow 0.1s steps(2);
  }
  .home-btn:hover {
    background: var(--soft);
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--ink);
  }
  .home-btn:active {
    transform: translate(4px, 4px);
    box-shadow: 0 0 0 var(--ink);
  }

  .select-header {
    text-align: center;
    margin-bottom: 4vh;
  }

  .select-header h2 {
    font-family: 'Galmuri11', 'DotGothic16', monospace;
    font-size: clamp(1.4rem, 2.6vw, 2rem);
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0;
  }

  .select-header .small {
    font-size: 0.78rem;
    color: var(--gray);
    margin-top: 0.6rem;
    letter-spacing: 0.35em;
  }

  /* ----- 스크롤 프레임 (픽셀 박스, 라운딩) ----- */
  .heroine-frame {
    position: relative;
    max-width: 1250px;
    margin: 0 auto;
    background: var(--surface);
    border: 4px solid var(--ink);
    border-radius: 18px;
    height: 80vh;
    overflow: hidden;
  }

  .heroine-frame .frame-corner {
    position: absolute;
    width: 28px;
    height: 28px;
    border: 0 solid var(--ink);
    pointer-events: none;
    z-index: 5;
  }
  .heroine-frame .frame-corner.tl { top: 12px; left: 12px;
    border-top-width: 5px; border-left-width: 5px; }
  .heroine-frame .frame-corner.tr { top: 12px; right: 12px;
    border-top-width: 5px; border-right-width: 5px; }
  .heroine-frame .frame-corner.bl { bottom: 12px; left: 12px;
    border-bottom-width: 5px; border-left-width: 5px; }
  .heroine-frame .frame-corner.br { bottom: 12px; right: 12px;
    border-bottom-width: 5px; border-right-width: 5px; }

  .heroine-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 1.2rem 1.5rem;
    height: 100%;
    overflow-y: auto;
    padding: 2.5rem 5rem 2.5rem;
  }

  /* 픽셀 스크롤바 */
  .heroine-grid::-webkit-scrollbar { width: 16px; }
  .heroine-grid::-webkit-scrollbar-track {
    background: var(--surface);
    border-left: 2px solid var(--ink);
  }
  .heroine-grid::-webkit-scrollbar-thumb {
    background: var(--ink);
    border: 2px solid var(--ink);
    box-shadow: inset 0 0 0 2px var(--surface);
  }

  .heroine-card {
    position: relative;
    cursor: pointer;
    text-align: center;
    transition: transform 0.1s steps(2);
    padding: 18px;
  }

  .heroine-card:hover { transform: translateY(-4px); }

  /* 호버 시 4 코너 브래킷 표시 */
  .heroine-card .hover-corner {
    position: absolute;
    width: 22px;
    height: 22px;
    border: 0 solid var(--ink);
    pointer-events: none;
    opacity: 0;
    z-index: 4;
    transition: opacity 0.1s steps(2);
  }
  .heroine-card:hover .hover-corner { opacity: 1; }
  .heroine-card .hover-corner.tl { top: 0; left: 0;
    border-top-width: 4px; border-left-width: 4px; }
  .heroine-card .hover-corner.tr { top: 0; right: 0;
    border-top-width: 4px; border-right-width: 4px; }
  .heroine-card .hover-corner.bl { bottom: 0; left: 0;
    border-bottom-width: 4px; border-left-width: 4px; }
  .heroine-card .hover-corner.br { bottom: 0; right: 0;
    border-bottom-width: 4px; border-right-width: 4px; }

  /* 마스크 본체 + 윤곽 오버레이 컨테이너 */
  .silhouette-frame {
    position: relative;
    width: 100%;
    aspect-ratio: 1473 / 1300;
  }

  .silhouette-outline {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    image-rendering: pixelated;
  }

  /* 흉상 PNG의 알파를 마스크로 사용 — 안에 YouTube 썸네일이 보임.
     모든 silhouette-N.png는 1473×1300 (가장 넓은 히로인 기준) 박스에
     원본 크기 그대로 가운데 정렬해 패딩되어 있음.
     `--silhouette` 변수는 카드별로 JS에서 다르게 주입함. */
  .silhouette-wrap {
    width: 100%;
    aspect-ratio: 1473 / 1300;
    position: relative;
    overflow: hidden;
    background: var(--soft);
    -webkit-mask-image: var(--silhouette);
            mask-image: var(--silhouette);
    -webkit-mask-size: contain;
            mask-size: contain;
    -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
    -webkit-mask-position: center;
            mask-position: center;
  }

  .silhouette-wrap img {
    width: 100%;
    height: 100%;
    scale: 1.3;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  .heroine-label {
    width: 100%;
    margin-top: 1.1rem;
    font-size: 1rem;
    color: var(--ink);
    font-weight: 500;
    letter-spacing: 0.02em;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 3.2rem;
    text-align: center;
    word-wrap: break-word;
    white-space: normal;
  }

  /* 제목이 길면 두 줄까지만 노출하고 말줄임. 이후 라인은 잘려나감. */
  .heroine-label .heroine-name {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.35;
    max-height: 2.7em;
    word-break: keep-all;
  }

  .heroine-label .loc {
    display: block;
    font-size: 0.78rem;
    color: var(--gray);
    margin-top: 0.3rem;
    letter-spacing: 0.1em;
  }

  /* mini affection display below the card */
  .aff-mini {
    margin-top: 0.7rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    font-size: 0.72rem;
    color: var(--mid);
    letter-spacing: 0.05em;
  }

  .aff-mini-icon {
    color: var(--ink);
    font-size: 0.85rem;
    line-height: 1;
  }

  .aff-mini-bar {
    width: 80px;
    height: 8px;
    border: 2px solid var(--ink);
    background: #fff;
    overflow: hidden;
    border-radius: 0;
  }

  .aff-mini-fill {
    display: block;
    height: 100%;
    width: 0%;
    background: var(--ink);
    /* 부드러운 트랜지션 대신 단계적으로 차오르는 픽셀 느낌 */
    transition: width 0.3s steps(8);
  }

  .aff-mini-pct {
    min-width: 32px;
    text-align: left;
    font-variant-numeric: tabular-nums;
    color: var(--mid);
  }

  /* ============================
     MAIN FLOW
     ============================ */
  #main-flow {
    position: fixed;
    inset: 0;
    background: var(--surface);
    z-index: 50;
    display: grid;
    grid-template-rows: auto 1fr;
    overflow: hidden;
    opacity: 1;
    transition: opacity 0.4s ease;
  }

  #main-flow.hidden {
    display: none;
    opacity: 0;
    pointer-events: none;
  }

  .mf-header {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    padding: 1.6vh 2vw;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
    z-index: 5;
  }

  .back-btn {
    font-size: 1.4rem;
    color: var(--ink);
    padding: 0.4rem 0.8rem;
    transition: transform 0.15s ease;
  }
  .back-btn:hover { transform: translateX(-3px); }

  .date-display {
    text-align: center;
    font-family: 'Galmuri11', 'DotGothic16', monospace;
    font-size: 1.05rem;
    color: var(--ink);
    letter-spacing: 0;
  }

  .header-spacer { width: 60px; }

  .mf-body {
    display: grid;
    grid-template-columns: minmax(280px, 360px) 1fr;
    gap: 2rem;
    padding: 2.5vh 2.5vw;
    min-height: 0;
    overflow: hidden;
  }

  /* ----- left panel ----- */
  .mf-left {
    display: flex;
    flex-direction: column;
    gap: 1.4rem;
    min-height: 0;
    overflow-y: auto;
  }

  .preview-thumb {
    width: 100%;
    aspect-ratio: 16 / 9;
    border: 2px solid var(--ink);
    overflow: hidden;
    background: #000;
    box-shadow: 4px 4px 0 var(--ink);
    margin-bottom: 0.5rem;
  }

  .preview-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .tip-block {
    border: 2px solid var(--ink);
    background: var(--surface);
    overflow: hidden;
    box-shadow: 4px 4px 0 var(--ink);
    margin-bottom: 0.5rem;
  }

  .tip-toggle {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 0.6rem;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid var(--ink);
    font-size: 0.95rem;
    color: var(--ink);
    text-align: left;
    background: var(--surface);
  }

  .tip-toggle .arrow {
    display: inline-block;
    transition: transform 0.2s ease;
  }
  .tip-block.collapsed .tip-toggle .arrow { transform: rotate(-90deg); }

  .tip-details {
    padding: 1rem 1.1rem;
    font-size: 0.85rem;
    line-height: 1.7;
    color: var(--ink);
    transition: max-height 0.3s ease, padding 0.3s ease;
    overflow: hidden;
  }

  .tip-block.collapsed .tip-details {
    max-height: 0;
    padding-top: 0;
    padding-bottom: 0;
  }

  .tip-row {
    display: grid;
    grid-template-columns: 50px 1fr;
    gap: 0.8rem;
  }

  .tip-row .k { color: var(--gray); font-size: 0.82rem; }
  .tip-row .v { color: var(--ink); word-break: keep-all; }

  /* choices */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
    margin-top: 0.2rem;
  }

  .choice {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    background: var(--surface);
    border: 2px solid var(--ink);
    border-radius: 0;
    padding: 0.85rem 0.6rem 0.85rem 1rem;
    font-size: 0.95rem;
    color: var(--ink);
    text-align: left;
    /* 픽셀 게임 박스 그림자 */
    box-shadow: 4px 4px 0 var(--ink);
    transition: transform 0.1s steps(2), box-shadow 0.1s steps(2), background 0.1s steps(2);
  }

  .choice:hover {
    background: var(--soft);
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--ink);
  }

  .choice:active {
    transform: translate(4px, 4px);
    box-shadow: 0 0 0 var(--ink);
  }

  .choice .ctext { flex: 1; padding-right: 0.6rem; line-height: 1.3; }

  .choice .cnum {
    flex-shrink: 0;
    width: 26px; height: 26px;
    border-radius: 0;
    border: 2px solid var(--ink);
    background: var(--ink);
    color: #fff;
    font-size: 0.85rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }

  /* ----- right stage ----- */
  .mf-right {
    position: relative;
    background-color: var(--surface);
    /* 픽셀 그리드 배경 — 가로/세로 1px 라인 16px 간격 */
    background-image:
      linear-gradient(to right, var(--line) 1px, transparent 1px),
      linear-gradient(to bottom, var(--line) 1px, transparent 1px);
    background-size: 16px 16px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  /* 정규화된 PNG 실루엣 마스크. `--silhouette`는 openHeroine에서 주입 */
  .silhouette-wrap-main {
    position: relative;
    height: 92%;
    aspect-ratio: 1473 / 1300;
    overflow: hidden;
    background: #000;
    -webkit-mask-image: var(--silhouette);
            mask-image: var(--silhouette);
    -webkit-mask-size: contain;
            mask-size: contain;
    -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
    -webkit-mask-position: center;
            mask-position: center;
    transition: filter 0.5s ease;
  }

  .video-inner { position: absolute; inset: 0; overflow: hidden; }

  .video-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .video-inner iframe {
    position: absolute;
    top: 0;
    left: 50%;
    height: 100%;
    width: calc(100% * 16 / 9);
    transform: translateX(-50%);
    border: 0;
    pointer-events: auto;
  }

  .aff-meter {
    position: absolute;
    top: 4%;
    right: 3%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.7rem;
    z-index: 10;
  }

  .aff-bar-v {
    width: 28px;
    height: 220px;
    border: 2px solid var(--ink);
    background: var(--surface);
    position: relative;
    overflow: hidden;
    border-radius: 0;
    box-shadow: 3px 3px 0 var(--ink);
    display: flex;
    align-items: flex-end;
  }

  .aff-fill-v {
    width: 100%;
    height: 0%;
    background: var(--ink);
    /* 단계적으로 차오르는 픽셀 게임 게이지 느낌 */
    transition: height 0.45s steps(10);
  }

  .heart-icon {
    font-size: 1.9rem;
    color: var(--ink);
    transition: transform 0.2s ease, color 0.3s ease;
    user-select: none;
  }

  .heart-icon.pulse { transform: scale(1.3); }

  .subtitle-overlay {
    position: absolute;
    left: 4%;
    right: 12%;
    bottom: 5%;
    background: rgba(0, 0, 0, 0.85);
    color: #fff;
    padding: 0.85rem 1.1rem;
    border: 2px solid var(--ink);
    border-radius: 0;
    z-index: 8;
    pointer-events: none;
  }

  .sub-row1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.85);
    margin-bottom: 0.3rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sub-row1 .sub-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.02em;
  }

  .sub-row1 .sub-dots {
    color: #fff;
    letter-spacing: 0.15em;
    font-size: 0.65rem;
    opacity: 0.85;
  }

  .sub-row2 {
    font-size: 0.95rem;
    line-height: 1.5;
    color: #fff;
    font-family: 'Galmuri11', 'DotGothic16', monospace;
    min-height: 1.3em;
  }

  .sub-text { opacity: 0; transition: opacity 0.4s ease; }
  .sub-text.show { opacity: 1; }

  .debug {
    position: absolute;
    bottom: 4px;
    left: 6px;
    font-size: 0.65rem;
    color: var(--gray);
    font-family: monospace;
    z-index: 100;
    background: rgba(255,255,255,0.85);
    padding: 2px 5px;
    pointer-events: none;
  }

  /* page indicator dots (bottom-right of viewport) */
  .page-indicator {
    position: fixed;
    right: 1.5vw;
    bottom: 50%;
    transform: translateY(50%);
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 30;
  }

  .page-indicator .dot {
    width: 10px;
    height: 10px;
    border-radius: 0;
    border: 2px solid var(--ink);
    background: var(--surface);
    transition: background 0.1s steps(2), transform 0.1s steps(2);
    cursor: pointer;
    padding: 0;
  }

  .page-indicator .dot.active {
    background: var(--ink);
  }

  /* responsive */

/* CSV parser — handles quoted multi-line cells and escaped quotes ("") */
function parseCSV(text) {
  const rows = [];
  let cur = [];
  let cell = "";
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQuotes && text[i + 1] === '"') { cell += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      cur.push(cell); cell = "";
    } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (ch === '\r' && text[i + 1] === '\n') i++;
      cur.push(cell); cell = "";
      rows.push(cur); cur = [];
    } else {
      cell += ch;
    }
  }
  if (cell.length || cur.length) { cur.push(cell); rows.push(cur); }

  const headers = (rows.shift() || []).map(h => h.trim());
  return rows
    .filter(r => r.some(v => String(v).trim() !== ""))
    .map(r => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (r[i] != null ? String(r[i]) : "").trim(); });
      return obj;
    });
}

/* Extract a YouTube ID from various URL shapes a user might paste in
   UL-Images: thumbnail URL, watch URL, youtu.be short URL, or raw ID. */
function youtubeIdFromImage(url) {
  if (!url) return "";
  const s = String(url).trim();
  let m = s.match(/\/vi\/([A-Za-z0-9_-]{6,})\//);          // img.youtube.com thumbnail
  if (m) return m[1];
  m = s.match(/[?&]v=([A-Za-z0-9_-]{6,})/);                // youtube.com/watch?v=ID
  if (m) return m[1];
  m = s.match(/youtu\.be\/([A-Za-z0-9_-]{6,})/);           // youtu.be/ID
  if (m) return m[1];
  m = s.match(/\/embed\/([A-Za-z0-9_-]{6,})/);             // youtube.com/embed/ID
  if (m) return m[1];
  if (/^[A-Za-z0-9_-]{6,16}$/.test(s)) return s;           // raw ID
  return "";
}

function transformCmsRows(rows) {
  if (!rows || !rows.length) return [];
  const first = rows[0] || {};
  pageMeta = {
    title:       first[KEYS.title]       || pageMeta.title,
    description: first[KEYS.description] || pageMeta.description,
    header:      first[KEYS.title]       || pageMeta.header,
    about:       first[KEYS.about]       || pageMeta.about,
  };

  const out = [];
  for (const r of rows) {
    // gate on UL-Project — every row that has a project becomes a heroine card,
    // even if UL-Images hasn't been filled in yet.
    const project = String(r[KEYS.project] || '').trim();
    if (!project) continue;

    const rawImage = String(r[KEYS.image] || '').trim();
    const yid = youtubeIdFromImage(rawImage);
    const thumbnail = yid
      ? `https://img.youtube.com/vi/${yid}/hqdefault.jpg`
      : rawImage;  // fallback: use whatever URL the user pasted

    const noteLines = String(r[KEYS.note] || '').split(/\r?\n/);
    const title = (noteLines[0] || '').trim() || project;
    const dateRaw = r[KEYS.date] != null ? String(r[KEYS.date]).trim() : '';
    out.push({
      name:      project,
      location:  String(r[KEYS.location] || '').trim(),
      title:     title,
      birthday:  dateRaw ? dateRaw + '년' : '',
      home:      project,
      youtubeId: yid,
      thumbnail: thumbnail,
      subs:      SUBS_BY_ID[yid] || [],
    });
  }
  return out;
}


function applyPageMeta() {

    titleEl.innerHTML = idx > 0
      ? pageMeta.header.slice(0, idx) + '<br>' + pageMeta.header.slice(idx + 1)

  }
  let descMeta = document.querySelector('meta[name="description"]');
  if (!descMeta) {
    descMeta = document.createElement('meta');
    descMeta.setAttribute('name', 'description');
    document.head.appendChild(descMeta);
  }
  if (pageMeta.description) descMeta.setAttribute('content', pageMeta.description);
}

    console.warn(
      "Tips: ① 시트 공유 설정을 \"링크가 있는 모든 사용자(뷰어)\" 로\n" +
      "      ② Spreadsheet ID 확인\n" +
      "      ③ Live Server 또는 GitHub Pages로 열기 (file:// 차단됨)"
    );
    heroines = FALLBACK_HEROINES;
  })
  .finally(() => {
    heroineState = heroines.map(() => ({ affection: 0 }));
    applyPageMeta();
    renderHeroineCards();
  });

/* =========================================================
   PAGE TRANSITIONS — wheel between sections
   ========================================================= */
const PAGES = ['title', 'heroine-select'];
let currentPage = 0;
let transitioning = false;
let lastWheelTime = 0;

function showPage(idx) {
  PAGES.forEach((id, i) => {
    document.getElementById(id).classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.page-indicator .dot').forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });
  currentPage = idx;
}

/* page indicator dots */
const indicator = document.getElementById('pageIndicator');
PAGES.forEach((id, i) => {
  const dot = document.createElement('button');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.title = id;
  dot.addEventListener('click', () => {
    if (transitioning) return;
    transitioning = true;
    showPage(i);
    setTimeout(() => transitioning = false, 700);
  });
  indicator.appendChild(dot);
});

const mainFlowEl = document.getElementById('main-flow');

function tryAdvance(direction) {
  if (transitioning) return;
  if (!mainFlowEl.classList.contains('hidden')) return;

  const cur = document.getElementById(PAGES[currentPage]);
  if (direction > 0) {
    // scrolling down — only advance if page is at bottom (or non-scrollable)
    if (cur.scrollHeight - cur.clientHeight - cur.scrollTop > 4) return;
    if (currentPage < PAGES.length - 1) {
      transitioning = true;
      showPage(currentPage + 1);
      setTimeout(() => transitioning = false, 720);
    }
  }
  // 위로 휠/스와이프로 이전 페이지로 돌아가지 않음 — 홈 버튼으로만 이동.
  // (이전엔 박스 안에서 스크롤하다가 자꾸 타이틀로 튕김)
}

window.addEventListener('wheel', (e) => {
  const now = Date.now();
  if (now - lastWheelTime < 600) return;
  if (Math.abs(e.deltaY) < 18) return;
  lastWheelTime = now;
  tryAdvance(e.deltaY > 0 ? 1 : -1);
}, { passive: true });

/* touch swipe (mobile) */
let touchStartY = null;
window.addEventListener('touchstart', (e) => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });
window.addEventListener('touchend', (e) => {
  if (touchStartY === null) return;
  const dy = touchStartY - (e.changedTouches[0]?.clientY ?? touchStartY);
  if (Math.abs(dy) > 60) tryAdvance(dy > 0 ? 1 : -1);
  touchStartY = null;
}, { passive: true });

/* =========================================================
   DATE in main flow header
   ========================================================= */
(function setDate() {
  const days = ['일','월','화','수','목','금','토'];
  const d = new Date();
  document.getElementById('dateDisplay').textContent =
    `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;
})();

/* =========================================================
   MAIN FLOW refs + state
   ========================================================= */
const mainFlow      = mainFlowEl;
const closeBtn      = document.getElementById('closeBtn');
const previewThumb  = document.getElementById('previewThumb');
const tipBlock      = document.getElementById('tipBlock');
const tipToggle     = document.getElementById('tipToggle');
const tipName       = document.getElementById('tipName');
const tipBirthday   = document.getElementById('tipBirthday');
const tipHome       = document.getElementById('tipHome');
const choicesWrap   = document.getElementById('choices');
const silhouetteWrap = document.getElementById('silhouetteWrap');
const videoInner    = document.getElementById('videoInner');
const affFill       = document.getElementById('affectionFill');
const heart         = document.getElementById('heart');
const subTitleEl    = document.getElementById('subTitle');
const subtitleText  = document.getElementById('subtitleText');
const debug         = document.getElementById('debug');

let affection = 0;
let currentHeroine = null;
let currentHeroineIdx = -1;
let subIndex = 0;
let subTimer = null;
let isPlaying = false;

/* =========================================================
   YouTube IFrame API
   ========================================================= */
let ytApiReady = false;
let currentYtPlayer = null;
const ytReadyQueue = [];

(function loadYouTubeAPI() {
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);
})();

window.onYouTubeIframeAPIReady = function () {
  ytApiReady = true;
  while (ytReadyQueue.length) ytReadyQueue.shift()();
};

function createYouTubePlayer(videoId) {
  destroyYouTubePlayer();
  videoInner.innerHTML = '<div id="ytPlayer"></div>';

  const playerVars = {
    autoplay: 1, mute: 1, rel: 0,
    modestbranding: 1, playsinline: 1,
    controls: 1, enablejsapi: 1,
  };
  if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
    playerVars.origin = window.location.origin;
  }

  const create = () => {
    currentYtPlayer = new YT.Player('ytPlayer', {
      videoId, width: '100%', height: '100%',
      playerVars,
      events: {
        onReady: (e) => {
          try {
            e.target.playVideo();
            setTimeout(() => {
              try { e.target.unMute(); e.target.setVolume(70); } catch(_){}
            }, 150);
          } catch (err) { console.warn('YT playback error:', err); }
        },
        onError: (e) => { console.warn('YT error code:', e.data); }
      },
    });
  };

  if (ytApiReady) create();
  else ytReadyQueue.push(create);
}

function destroyYouTubePlayer() {
  if (currentYtPlayer) {
    try { currentYtPlayer.destroy(); } catch (e) {}
    currentYtPlayer = null;
  }
  videoInner.innerHTML = '';
}

/* =========================================================
   OPEN / CLOSE main flow (with state preservation)
   ========================================================= */
function openHeroine(i) {
  currentHeroine = heroines[i];
  currentHeroineIdx = i;

  // restore previous affection for this heroine
  affection = heroineState[i].affection;
  subIndex = 0;
  isPlaying = false;

  tipName.textContent = currentHeroine.title;
  tipBirthday.textContent = currentHeroine.birthday;
  tipHome.textContent = currentHeroine.home;

  const yid = currentHeroine.youtubeId;
  const previewSrc = yid
    ? `https://img.youtube.com/vi/${yid}/hqdefault.jpg`
    : (currentHeroine.thumbnail || '');
  const stageSrc = yid
    ? `https://img.youtube.com/vi/${yid}/maxresdefault.jpg`
    : (currentHeroine.thumbnail || '');
  previewThumb.src = previewSrc;
  previewThumb.alt = currentHeroine.title;

  subTitleEl.textContent = currentHeroine.title;

  videoInner.innerHTML = `<img src="${stageSrc}" alt="">`;

  // 정규화된 PNG 실루엣을 마스크로 주입 — 영상이 캐릭터 모양으로 클립됨
  silhouetteWrap.style.setProperty('--silhouette', `url('${silhouetteFor(i)}')`);

  subtitleText.textContent = '';
  subtitleText.classList.remove('show');

  applyAffection();
  heart.classList.remove('pulse');

  document.querySelectorAll('.choice').forEach(c => c.classList.remove('disabled'));

  mainFlow.classList.remove('hidden');
  mainFlow.setAttribute('aria-hidden', 'false');
  updateDebug();
}

function closeMainFlow() {
  // persist affection back to state
  if (currentHeroineIdx >= 0) {
    heroineState[currentHeroineIdx].affection = affection;
    refreshCard(currentHeroineIdx);
  }

  mainFlow.classList.add('hidden');
  mainFlow.setAttribute('aria-hidden', 'true');
  stopSubtitleLoop();
  isPlaying = false;
  destroyYouTubePlayer();
}

closeBtn.addEventListener('click', closeMainFlow);

/* =========================================================
   tip block toggle
   ========================================================= */
tipToggle.addEventListener('click', () => {
  tipBlock.classList.toggle('collapsed');
});

/* =========================================================
   CHOICES — clicks bump affection; first click starts player
   ========================================================= */
choicesWrap.addEventListener('click', (e) => {
  const btn = e.target.closest('.choice');
  if (!btn || !currentHeroine) return;

  affection = Math.min(100, affection + 8);
  applyAffection();
  pulseHeart();

  if (!isPlaying) {
    isPlaying = true;
    if (currentHeroine.youtubeId) createYouTubePlayer(currentHeroine.youtubeId);
    startSubtitleLoop();
  } else if (currentYtPlayer) {
    try {
      currentYtPlayer.unMute();
      currentYtPlayer.setVolume(70);
      currentYtPlayer.playVideo();
    } catch (_) {}
  }

  btn.style.background = 'var(--soft)';
  setTimeout(() => { btn.style.background = ''; }, 220);

  updateDebug();
});

function applyAffection() {
  let blur = 0;
  if (affection > 16) {
    blur = ((affection - 16) / (100 - 16)) * 22;
  }
  silhouetteWrap.style.filter = `blur(${blur}px)`;
  affFill.style.height = affection + '%';

  // monochrome heart: from gray (low) to pure black (high)
  const lightness = Math.max(8, 60 - affection * 0.55);
  heart.style.color = `hsl(0, 0%, ${lightness}%)`;
}

function pulseHeart() {
  heart.classList.add('pulse');
  setTimeout(() => heart.classList.remove('pulse'), 280);
}

/* =========================================================
   SUBTITLES
   ========================================================= */
function startSubtitleLoop() {
  stopSubtitleLoop();
  tickSubtitle();
  subTimer = setInterval(tickSubtitle, 3200);
}

function stopSubtitleLoop() {
  if (subTimer) { clearInterval(subTimer); subTimer = null; }
}

function tickSubtitle() {
  if (!currentHeroine) return;
  const skipChance = (affection / 100) * 0.9;
  subtitleText.classList.remove('show');

  setTimeout(() => {
    if (Math.random() < skipChance) {
      subtitleText.textContent = (affection > 70) ? '…' : '';
    } else {
      const subs = currentHeroine.subs;
      subtitleText.textContent = subs[subIndex % subs.length];
      subIndex++;
    }
    subtitleText.classList.add('show');
  }, 400);
}

function updateDebug() {
  const skip = ((affection / 100) * 0.9 * 100).toFixed(0);
  const blur = ((Math.max(0, affection - 16) / 84) * 22).toFixed(1);
  debug.textContent = `affection ${affection} / blur ${blur}px / subtitle skip ${skip}%`;
}
updateDebug();

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && !mainFlow.classList.contains('hidden')) closeMainFlow();
  if (!mainFlow.classList.contains('hidden')) {
    if (e.key >= '1' && e.key <= '4') {
      const idx = parseInt(e.key, 10) - 1;
      const buttons = choicesWrap.querySelectorAll('.choice');
      if (buttons[idx]) buttons[idx].click();
    }
  } else {
    // page navigation via arrow keys — 아래 방향만. 위로는 HOME 버튼으로만.
    if (e.key === 'ArrowDown' || e.key === 'PageDown') tryAdvance(1);
  }
});

/* HOME 버튼 — heroine-select에서 타이틀로 명시적으로 복귀하는 유일한 길 */
const homeBtn = document.getElementById('homeBtn');
if (homeBtn) {
  homeBtn.addEventListener('click', () => {
    if (transitioning) return;
    transitioning = true;
    showPage(0);
    setTimeout(() => transitioning = false, 720);
  });
}
</script>

</body>
